name: Schedule g04

on:
  schedule:
    - cron: '0 17 * * *' 
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Create directory for the previous day
        run: |
          YESTERDAY=$(date -d "yesterday" +'%Y_%m%d')
          mkdir -p "${YESTERDAY}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 pytz boto3

      - name: Run scraper
        run: python py/file-g04.py

      - name: Commit and push if changes exist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # 差分（ステージングされた変更）があるか確認し、ある場合のみ実行
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "Update csv files - $(date +'%Y-%m-%d')"
            git pull origin main --rebase
            git push origin main
          else
            echo "No changes to commit."
          fi
